<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent et Melanie - Mariage</title>
</head>
<body>
    <header>
        <h1>Bienvenue au mariage de Vincent et Melanie</h1>
    </header>
    <main>
        <section>
            <h2>Informations</h2>
            <p>Nous sommes ravis de vous inviter à célébrer notre mariage le 30 juin 2026.</p>
        </section>
        <section>
            <h2>RSVP</h2>
            <form>
                <label for="name">Nom:</label>
                <input type="text" id="name" placeholder="Entrez votre nom" required>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Entrez votre email" required>
                <button type="submit">Soumettre</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Merci et à bientôt!</p>
    </footer>
</body>
</html>
